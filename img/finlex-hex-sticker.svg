             L140.0,148.9 L142.8,140.7 L148.2,131.8 L161.9,116.5 L165.9,113.5 L165.3,107.5
             L157.0,100.8 L155.0,95.3 L154.8,73.5 L145.5,63.9 L137.5,57.0 L141.1,53.2
             L147.7,60.7 L155.5,60.0 L162.0,63.4 L167.7,57.2 L170.6,46.8 L179.9,42.0
